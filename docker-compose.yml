version: "3"

services:
  taxi-app:
    build: demo/app/taxi-app
    ports:
      - "5000:5000"
    links:
      - testdata-sim
    depends_on:
      - testdata-sim
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5

  testdata-sim:
    build: demo/app/testdata-sim
    ports:
      - "6000:6000"

  smoketest:
    build: demo/test/taxi-test-docker-smoketest
    depends_on:
      - taxi-app
      - testdata-sim
    links:
      - taxi-app
      - testdata-sim